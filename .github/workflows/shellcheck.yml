name: ShellCheck CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  shellcheck:
    name: Run ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Run ShellCheck on install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'
          ignore_paths: 'configs'
